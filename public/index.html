<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Chat</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #111;
  border-bottom: 1px solid #333;
}

#online {
  font-size: 14px;
  color: #aaa;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  scroll-behavior: smooth;
}

.message {
  max-width: 85%;
  padding: 14px 18px;
  margin: 8px 0;
  border-radius: 18px;
  font-size: 17px;
  line-height: 1.4;
  animation: fadeIn 0.3s ease;
  transition: 0.2s;
  word-wrap: break-word;
}

.me {
  align-self: flex-end;
  background: #3b82f6;
}

.other {
  align-self: flex-start;
  background: #333;
}

.username {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
}

.time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
}

#typing {
  font-size: 12px;
  color: #aaa;
  padding-left: 20px;
  height: 20px;
}

#inputArea {
  display: flex;
  padding: 15px;
  background: #111;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 18px;
  border-radius: 12px;
  border: none;
  font-size: 17px;
}

button {
  padding: 18px 22px;
  margin-left: 10px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

#toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #3b82f6;
  color: white;
  padding: 14px 20px;
  border-radius: 12px;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-size: 14px;
  z-index: 9999;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<header>
  <h2>Discussion Group</h2>
  <div id="online">Online: 0</div>
</header>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Tulis pesan..." autocomplete="off">
  <button onclick="sendMessage()">Kirim</button>
</div>

<div id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

if (key !== "ghcxvmuvvyvysjvhevdhvhvdhcyryvhsjs32jbjjb1") {
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50px;'>Akses ditolak</h1>";
  throw new Error("Unauthorized");
}

const socket = io();

const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");
const typingDiv = document.getElementById("typing");
const onlineDiv = document.getElementById("online");

let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Masukkan username kamu:");
  if (!username || username.trim() === "") {
    username = "User" + Math.floor(Math.random() * 1000);
  }
  localStorage.setItem("username", username);
}

socket.emit("registerUser", username);

// 🔥 REGISTER TELEGRAM CHAT ID (jika ada)
const chatId = localStorage.getItem("telegramChatId");
if (chatId) {
  socket.emit("registerTelegram", {
    username: username,
    chatId: chatId
  });
}

function escapeHTML(text) {
  return text.replace(/[&<>"']/g, function(m) {
    return ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    })[m];
  });
}

function sendMessage() {
  const text = input.value.trim();
  if (text === "") return;

  socket.emit("chatMessage", {
    username: username,
    message: text
  });

  input.value = "";
}

let typingTimeout;

input.addEventListener("input", () => {
  socket.emit("typing", username);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit("stopTyping");
  }, 1500);
});

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

function renderMessage(data) {
  const msg = document.createElement("div");
  msg.classList.add("message");
  msg.classList.add(data.username === username ? "me" : "other");
  msg.dataset.id = data.id;

  let messageText = escapeHTML(data.message);

  if (messageText.includes("@" + username)) {
    msg.style.border = "2px solid #3b82f6";
    msg.style.boxShadow = "0 0 15px #3b82f6";
  }

  messageText = messageText.replace(
    new RegExp("@" + username, "g"),
    `<span style="color:#3b82f6;font-weight:bold">@${username}</span>`
  );

  msg.innerHTML = `
    <div class="username">${escapeHTML(data.username)}</div>
    <div>${messageText}</div>
    <div class="time">${data.time}</div>
  `;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

socket.on("chatMessage", renderMessage);

socket.on("loadMessages", (messages) => {
  chat.innerHTML = "";
  messages.forEach(renderMessage);
});

socket.on("messageDeleted", (id) => {
  const message = document.querySelector(`[data-id='${id}']`);
  if (message) message.remove();
});

socket.on("typing", (name) => {
  typingDiv.textContent = name + " sedang mengetik...";
});

socket.on("stopTyping", () => {
  typingDiv.textContent = "";
});

socket.on("onlineCount", (count) => {
  onlineDiv.textContent = "Online: " + count;
});

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 3000);
}

socket.on("mentioned", (data) => {
  showToast("Kamu di-tag oleh " + data.from + " 🔔");

  const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3");
  audio.volume = 0.3;
  audio.play();
});
</script>

</body>
</html>
